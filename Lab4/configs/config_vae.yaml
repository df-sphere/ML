data:
  dataset: mnist # fashionmnist
train:
  batch_size: 64
  lr: 0.001
  n_epochs: 10 
  num_workers: 30 # change this based on number of cores on your CPU. 4 is sufficient for 1 gpu. If unsure leave at 1.
network:
  model: vae # vae, gan, diffusion
  hidden_dim: 400 # used for VAE and gan
  latent_dim: 60 # used for VAE or gan
vae:
  vae_recon_loss: l1 # l1 or l2
  beta: 0.05
diffusion:
  time_dim: 128
  timesteps: 500
optimizer:
  type: "adamw" # adamw or sgd
  weight_decay: 0.0 #0.001
gan:
  leaky: False

