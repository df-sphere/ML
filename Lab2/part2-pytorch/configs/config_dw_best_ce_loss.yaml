Train:
  batch_size: 128
  learning_rate: 0.025
  reg: 0.0005
  epochs: 50
  steps: [30, 40]
  warmup: 2
  momentum: 0.9
  gamma: 1

network:
  model: ResNet-32 # TwoLayerNet or VanillaCNN or MyModel or ResNet-32
  save_best: True

data:
  imbalance: imbalance # regular or imbalance
  beta: 0.9999

loss:
  loss_type: CE # CE or Focal
